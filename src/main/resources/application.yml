server:
  port: 8888

spring:
  application:
    name: smartagent-core
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/smartagent?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

# MyBatis-Flex配置
mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-scan: com.agent.mapper

# Agent配置
agent:
  model:
    # MiniMax配置（优先使用）
    minimax:
      api-key: sk-cp-Us3_nmvtSJTBXRTtrKRgWBJBlk2aVGUx45BHoshtXyZtmSRRJJ65ZCIZW0HQ5b6ZWnHV6dbhXEjJH8vHLu46p36n_q9yPlaaM3pPVQ-v7YIFgwe89CK8PH8
      model: MiniMax-M3
      base-url: https://api.minimax.chat

# 日志配置
logging:
  level:
    com.agent: DEBUG
